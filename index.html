<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WüLD</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <ul>
            <li><a href="/"></strong>Wüzengrevein Dictionary</strong></a></li>
            <li><a href="about.html"></strong>About</strong></a></li>
        </ul>
    </nav>
    <h2>Würzengrevein Language Dictionary(WüLD)</h2>
    <p class="wordcount">Word Count:<span id="word-count">0</span></p>
    <input class="searchbar" type="text" name="word" id="word" placeholder="Search Words..">
    <br>
    <ul id="results"></ul>

    <script>
        let dictionary = [];
        const searchInput = document.getElementById('word');
        const resultsList = document.getElementById('results');
        const wordCount = document.getElementById('word-count');

        function updateWordCount(count) {
            wordCount.textContent = count;
        }


        window.addEventListener('load', () => {
            dictionary = [
                { word: "Würz", meaning: "Root / Origin", pos: "noun", pronunciation: "/vʏrts/" },
                { word: "Grevein", meaning: "Language / Tongue", pos: "noun", pronunciation: "/ˈɡreɪvaɪn/" },
                { word: "Hallo", meaning: "Hello", pos: "interjection", pronunciation: "/ˈhalo/" },
                { word: "Welt", meaning: "World", pos: "noun", pronunciation: "/vɛlt/" },
                { word: "Buch", meaning: "Book", pos: "noun", pronunciation: "/buːx/" }
            ];
            dictionary.sort((a, b) => a.word.localeCompare(b.word));
            displayResults(dictionary);
        });

        function displayResults(results) {
            resultsList.innerHTML = '';
            updateWordCount(dictionary.length);

            if (results.length === 0) {
                resultsList.innerHTML = '<li>No results found</li>';
                return;
            }

            results.forEach((item, index) => {
                const li = document.createElement('li');
                li.style.animationDelay = `${index * 0.05}s`;
                li.innerHTML = `<strong>${item.word}</strong> <small style="color:#81AEC7;">(${item.pos})</small>: ${item.meaning} <span style="color:#B5B0B0;">${item.pronunciation}</span>`;
                resultsList.appendChild(li);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();

            if (searchTerm === '') {
                displayResults(dictionary);
                return;
            }

            const filteredResults = dictionary.filter(item =>
                item.word.toLowerCase().includes(searchTerm) ||
                item.meaning.toLowerCase().includes(searchTerm)
            );

            displayResults(filteredResults);
        });
    </script>
</body>

</html>
