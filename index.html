<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wüzengrevein dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
        <nav>
        <ul>
            <li><a href="/"></strong>Wüzengrevein Dictionary</strong></a></li>
            <li><a href="about.html"></strong>About</strong></a></li>
        </ul>
    </nav>
    <h2>Würzengrevein Language Dictionary</h2>
    <p class="wordcount">Words In The Dictionary: <span id="word-count">0</span></p>
    <input class="searchbar" type="text" name="word" id="word" placeholder="Search For Words in the dictionary.">
    <br>
    <ul id="results"></ul>

    <script>
        let dictionary = [];
        const searchInput = document.getElementById('word');
        const resultsList = document.getElementById('results');
        const wordCount = document.getElementById('word-count');

        function updateWordCount(count) {
            wordCount.textContent = count;
        }

     
        window.addEventListener('load', () => {
            dictionary = [
                { word: "Würz", meaning: "Root / Origin" },
                { word: "Grevein", meaning: "Language / Tongue" },
                { word: "Hallo", meaning: "Hello" },
                { word: "Welt", meaning: "World" },
                { word: "Buch", meaning: "Book" }
            ];
            dictionary.sort((a, b) => a.word.localeCompare(b.word)); 
            displayResults(dictionary); 
        });

        function displayResults(results) {
            resultsList.innerHTML = '';
            updateWordCount(results.length);

            if (results.length === 0) {
                resultsList.innerHTML = '<li>No results found</li>';
                return;
            }

            results.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<strong>${item.word}</strong>: ${item.meaning}`;
                resultsList.appendChild(li);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();

            if (searchTerm === '') {
                displayResults(dictionary);
                return;
            }

            const filteredResults = dictionary.filter(item =>
                item.word.toLowerCase().includes(searchTerm) ||
                item.meaning.toLowerCase().includes(searchTerm)
            );

            displayResults(filteredResults);
        });
    </script>
</body>

</html>
